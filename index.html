<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My AI Cinema</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: 'Helvetica Neue', sans-serif; }
    .row { scrollbar-width: none; }
    .row::-webkit-scrollbar { display: none; }
    .thumbnail { transition: all 0.3s; }
    .thumbnail:hover { transform: scale(1.08); z-index: 10; }
  </style>
</head>
<body class="bg-black text-white min-h-screen">

  <header class="fixed top-0 w-full bg-gradient-to-b from-black to-transparent z-50">
    <div class="max-w-screen-2xl mx-auto px-8 py-4 flex items-center justify-between">
      <h1 class="text-4xl font-bold text-red-600">My AI</h1>
    </div>
  </header>

  <!-- HERO with YOUR video -->
  <div class="relative h-screen bg-cover bg-center" style="background-image: url('https://img.youtube.com/vi/IrNwWee_tfY/maxresdefault.jpg')">
    <div class="absolute inset-0 bg-gradient-to-r from-black via-black/70 to-transparent"></div>
    <div class="absolute bottom-1/3 left-8 max-w-lg">
      <h2 class="text-6xl font-bold mb-4">My AI Video</h2>
      <button onclick="playFeatured()" class="bg-white text-black px-10 py-3 rounded font-bold flex items-center gap-2 hover:bg-gray-300">
        ▶ PLAY
      </button>
    </div>
  </div>

  <!-- ROW -->
  <div class="max-w-screen-2xl mx-auto px-8 pb-12 -mt-20 relative z-10">
    <div class="mb-8">
      <h3 class="text-xl font-semibold mb-4">My AI Videos</h3>
      <div class="flex gap-4 overflow-x-auto row">
        <div onclick="playVideo('IrNwWee_tfY')" class="thumbnail min-w-[280px] cursor-pointer">
          <img src="https://img.youtube.com/vi/IrNwWee_tfY/hqdefault.jpg" class="rounded">
        </div>
      </div>
    </div>
  </div>

  <!-- PLAYER -->
  <div id="modal" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center z-50">
    <div class="max-w-5xl w-full px-4">
      <button onclick="closeModal()" class="absolute top-8 right-8 text-4xl text-white">✕</button>
      <div class="aspect-video bg-black">
        <iframe id="player" width="100%" height="100%" frameborder="0" allowfullscreen></iframe>
      </div>
    </div>
  </div>

  <script>
    function playVideo(id) {
      document.getElementById('player').src = `https://www.youtube.com/embed/${id}?autoplay=1`;
      document.getElementById('modal').classList.remove('hidden');
    }
    function closeModal() {
      document.getElementById('player').src = '';
      document.getElementById('modal').classList.add('hidden');
    }
    function playFeatured() {
      playVideo('IrNwWee_tfY');
    }
  </script>
</body>
</html>
